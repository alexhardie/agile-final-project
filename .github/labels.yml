# Standardized Labeling System for Personal Projects

labels:
  - name: "bug"
    color: "d73a4a"
    description: "Something isn't working"
  - name: "feature"
    color: "0052cc"
    description: "New feature or enhancement"
  - name: "enhancement"
    color: "a2eeef"
    description: "Improvement to existing functionality"
  - name: "documentation"
    color: "0075ca"
    description: "Changes to documentation"
  - name: "help wanted"
    color: "f9c2ff"
    description: "Looking for help"
  - name: "good first issue"
    color: "e4f6a0"
    description: "Good for newcomers"
  - name: "wontfix"
    color: "cfd3d7"
    description: "Will not fix"
